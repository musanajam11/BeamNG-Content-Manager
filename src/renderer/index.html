<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>BeamMP Content Manager</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!--
      Cloudflare Turnstile is allowed in script-src/frame-src/connect-src so
      the bmr.musanet.xyz sign-in modal can render the captcha widget inline.
      All actual bmr API traffic is proxied through the main process; the
      renderer never speaks to bmr.musanet.xyz directly.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' vehicle-asset:; script-src 'self' blob: https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: vehicle-asset:; connect-src 'self' vehicle-asset: https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; worker-src 'self' blob:"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
