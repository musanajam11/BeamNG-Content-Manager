<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1119"/>
    </linearGradient>
    <!-- Cyan node gradient -->
    <radialGradient id="nodeGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <filter id="beamGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#22d3ee" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Same 3-node triangle as BeamNG, just cyan — pure color swap, nothing else -->
  <g filter="url(#beamGlow)">
    <line x1="256" y1="128" x2="136" y2="336" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <line x1="256" y1="128" x2="376" y2="336" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <line x1="136" y1="336" x2="376" y2="336" stroke="white" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- Nodes (cyan) — same positions, just color change -->
  <g filter="url(#nodeShadow)">
    <circle cx="256" cy="128" r="46" fill="url(#nodeGrad)"/>
    <circle cx="136" cy="336" r="46" fill="url(#nodeGrad)"/>
    <circle cx="376" cy="336" r="46" fill="url(#nodeGrad)"/>
  </g>
</svg>