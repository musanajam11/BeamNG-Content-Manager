<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1119"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#38bdf8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle road line accent under text -->
  <g opacity="0.15">
    <line x1="100" y1="340" x2="412" y2="340" stroke="#38bdf8" stroke-width="3" stroke-dasharray="20,12"/>
  </g>

  <!-- "C" letter -->
  <g transform="translate(152, 256)" filter="url(#shadow)">
    <!-- C as a bold rounded stroke -->
    <path d="M 68,0 A 68,68 0 1,0 68,0.01" fill="none" stroke="url(#textGrad)" stroke-width="28" stroke-linecap="round"
          transform="rotate(45)" stroke-dasharray="320" stroke-dashoffset="85"/>
  </g>

  <!-- "M" letter -->
  <g transform="translate(280, 256)" filter="url(#shadow)">
    <path d="M -52,52 L -52,-40 L 0,-5 L 52,-40 L 52,52" 
          fill="none" stroke="url(#accentGrad)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small tire track / tread accent at bottom -->
  <g transform="translate(256, 390)" opacity="0.3">
    <rect x="-80" y="-4" width="16" height="8" rx="2" fill="#38bdf8" transform="rotate(-15)"/>
    <rect x="-52" y="-4" width="16" height="8" rx="2" fill="#38bdf8" transform="rotate(-10)"/>
    <rect x="-24" y="-4" width="16" height="8" rx="2" fill="#38bdf8" transform="rotate(-5)"/>
    <rect x="4" y="-4" width="16" height="8" rx="2" fill="#38bdf8"/>
    <rect x="32" y="-4" width="16" height="8" rx="2" fill="#38bdf8" transform="rotate(5)"/>
    <rect x="60" y="-4" width="16" height="8" rx="2" fill="#38bdf8" transform="rotate(10)"/>
  </g>
</svg>