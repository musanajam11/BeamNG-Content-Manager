<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGrad" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#fdd5a0"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="hubGrad" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#fbbf6a"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </radialGradient>
    <linearGradient id="spokeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f97316" flood-opacity="0.55"/>
    </filter>
    <filter id="hubGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#f97316" flood-opacity="0.5"/>
    </filter>
    <filter id="cmGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="220" fill="url(#centerGlow)"/>

  <!-- Hex vertices r=175: 0°(256,81) 60°(407.6,168.5) 120°(407.6,343.5) 180°(256,431) 240°(104.4,343.5) 300°(104.4,168.5) -->

  <!-- Cross-links (secondary connections for a richer network) -->
  <g filter="url(#lineGlow)" opacity="0.12">
    <line x1="256" y1="81" x2="407" y2="343" stroke="white" stroke-width="2"/>
    <line x1="256" y1="81" x2="105" y2="343" stroke="white" stroke-width="2"/>
    <line x1="407" y1="169" x2="105" y2="343" stroke="white" stroke-width="2"/>
    <line x1="407" y1="169" x2="256" y2="431" stroke="white" stroke-width="2"/>
    <line x1="407" y1="343" x2="105" y2="169" stroke="white" stroke-width="2"/>
    <line x1="105" y1="169" x2="256" y2="431" stroke="white" stroke-width="2"/>
  </g>

  <!-- Outer ring edges -->
  <g filter="url(#lineGlow)" opacity="0.4">
    <line x1="256" y1="81" x2="407" y2="169" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="407" y1="169" x2="407" y2="343" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="407" y1="343" x2="256" y2="431" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="256" y1="431" x2="105" y2="343" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="105" y1="343" x2="105" y2="169" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="105" y1="169" x2="256" y2="81" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Spokes — orange, thicker, glowing -->
  <g filter="url(#lineGlow)" opacity="0.7">
    <line x1="256" y1="256" x2="256" y2="81" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="407" y2="169" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="407" y2="343" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="256" y2="431" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="105" y2="343" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="105" y2="169" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Outer nodes — medium, with glow -->
  <g filter="url(#nodeGlow)">
    <circle cx="256" cy="81" r="18" fill="url(#nodeGrad)"/>
    <circle cx="407" cy="169" r="18" fill="url(#nodeGrad)"/>
    <circle cx="407" cy="343" r="18" fill="url(#nodeGrad)"/>
    <circle cx="256" cy="431" r="18" fill="url(#nodeGrad)"/>
    <circle cx="105" cy="343" r="18" fill="url(#nodeGrad)"/>
    <circle cx="105" cy="169" r="18" fill="url(#nodeGrad)"/>
  </g>

  <!-- Center hub — large, prominent -->
  <circle cx="256" cy="256" r="36" fill="url(#hubGrad)" filter="url(#hubGlow)"/>
  <circle cx="250" cy="248" r="8" fill="white" opacity="0.2"/>

  <!-- CM — white, clean, centered over hub -->
  <g filter="url(#cmGlow)" opacity="0.95">
    <path d="M 222,215 C 182,215 162,232 162,256 C 162,280 182,297 222,297"
          fill="none" stroke="white" stroke-width="20" stroke-linecap="round"/>
    <path d="M 248,297 L 248,215 L 282,270 L 316,215 L 316,297"
          fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>