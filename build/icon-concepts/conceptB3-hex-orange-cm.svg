<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fdd5a0"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="hubGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fbbf6a"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </radialGradient>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#f97316" flood-opacity="0.6"/>
    </filter>
    <filter id="hubGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#f97316" flood-opacity="0.55"/>
    </filter>
    <filter id="cmGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="220" fill="url(#centerGlow)"/>

  <!-- Hex r=165 (tighter): 0°(256,91) 60°(399,173.5) 120°(399,338.5) 180°(256,421) 240°(113,338.5) 300°(113,173.5) -->

  <!-- Cross-links — slightly brighter for richer mesh -->
  <g filter="url(#lineGlow)" opacity="0.15">
    <line x1="256" y1="91" x2="399" y2="339" stroke="white" stroke-width="2.5"/>
    <line x1="256" y1="91" x2="113" y2="339" stroke="white" stroke-width="2.5"/>
    <line x1="399" y1="174" x2="113" y2="339" stroke="white" stroke-width="2.5"/>
    <line x1="399" y1="174" x2="256" y2="421" stroke="white" stroke-width="2.5"/>
    <line x1="399" y1="339" x2="113" y2="174" stroke="white" stroke-width="2.5"/>
    <line x1="113" y1="174" x2="256" y2="421" stroke="white" stroke-width="2.5"/>
  </g>

  <!-- Outer hex ring — orange tinted instead of pure white -->
  <g filter="url(#lineGlow)" opacity="0.5">
    <line x1="256" y1="91" x2="399" y2="174" stroke="#fb923c" stroke-width="5" stroke-linecap="round"/>
    <line x1="399" y1="174" x2="399" y2="339" stroke="#fb923c" stroke-width="5" stroke-linecap="round"/>
    <line x1="399" y1="339" x2="256" y2="421" stroke="#fb923c" stroke-width="5" stroke-linecap="round"/>
    <line x1="256" y1="421" x2="113" y2="339" stroke="#fb923c" stroke-width="5" stroke-linecap="round"/>
    <line x1="113" y1="339" x2="113" y2="174" stroke="#fb923c" stroke-width="5" stroke-linecap="round"/>
    <line x1="113" y1="174" x2="256" y2="91" stroke="#fb923c" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Spokes — white, clean -->
  <g filter="url(#lineGlow)" opacity="0.6">
    <line x1="256" y1="256" x2="256" y2="91" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="399" y2="174" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="399" y2="339" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="256" y2="421" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="113" y2="339" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="113" y2="174" stroke="white" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Outer nodes -->
  <g filter="url(#nodeGlow)">
    <circle cx="256" cy="91" r="20" fill="url(#nodeGrad)"/>
    <circle cx="399" cy="174" r="20" fill="url(#nodeGrad)"/>
    <circle cx="399" cy="339" r="20" fill="url(#nodeGrad)"/>
    <circle cx="256" cy="421" r="20" fill="url(#nodeGrad)"/>
    <circle cx="113" cy="339" r="20" fill="url(#nodeGrad)"/>
    <circle cx="113" cy="174" r="20" fill="url(#nodeGrad)"/>
  </g>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="40" fill="url(#hubGrad)" filter="url(#hubGlow)"/>
  <circle cx="249" cy="247" r="9" fill="white" opacity="0.22"/>

  <!-- CM — orange with glow, bold -->
  <g filter="url(#cmGlow)" opacity="0.95">
    <path d="M 224,214 C 180,214 158,234 158,258 C 158,282 180,302 224,302"
          fill="none" stroke="#f97316" stroke-width="22" stroke-linecap="round"/>
    <path d="M 250,302 L 250,214 L 286,272 L 322,214 L 322,302"
          fill="none" stroke="#f97316" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>