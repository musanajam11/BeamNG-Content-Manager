<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1119"/>
    </linearGradient>
    <!-- Cyan/teal node gradient (replaces orange) -->
    <radialGradient id="nodeGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <!-- Beam glow -->
    <filter id="beamGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Node shadow -->
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0891b2" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background (same dark rounded square) -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Triangle beams (white, same as original) -->
  <g filter="url(#beamGlow)">
    <line x1="256" y1="128" x2="136" y2="336" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <line x1="256" y1="128" x2="376" y2="336" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <line x1="136" y1="336" x2="376" y2="336" stroke="white" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- Nodes (cyan instead of orange) -->
  <g filter="url(#nodeShadow)">
    <!-- Top node -->
    <circle cx="256" cy="128" r="46" fill="url(#nodeGrad)"/>
    <!-- Bottom-left node -->
    <circle cx="136" cy="336" r="46" fill="url(#nodeGrad)"/>
    <!-- Bottom-right node -->
    <circle cx="376" cy="336" r="46" fill="url(#nodeGrad)"/>
  </g>

  <!-- Small gear/cog inside bottom-right node (subtle "manager" hint) -->
  <g transform="translate(376, 336)" opacity="0.35">
    <circle cx="0" cy="0" r="16" fill="none" stroke="white" stroke-width="4"/>
    <rect x="-2" y="-22" width="4" height="8" rx="2" fill="white"/>
    <rect x="-2" y="14" width="4" height="8" rx="2" fill="white"/>
    <rect x="-22" y="-2" width="8" height="4" rx="2" fill="white"/>
    <rect x="14" y="-2" width="8" height="4" rx="2" fill="white"/>
    <g transform="rotate(45)">
      <rect x="-2" y="-22" width="4" height="8" rx="2" fill="white"/>
      <rect x="-2" y="14" width="4" height="8" rx="2" fill="white"/>
      <rect x="-22" y="-2" width="8" height="4" rx="2" fill="white"/>
      <rect x="14" y="-2" width="8" height="4" rx="2" fill="white"/>
    </g>
    <circle cx="0" cy="0" r="7" fill="white" opacity="0.3"/>
  </g>
</svg>