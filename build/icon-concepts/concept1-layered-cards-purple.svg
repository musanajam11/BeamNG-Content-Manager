<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1525"/>
      <stop offset="100%" stop-color="#0f0d17"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Back card (tilted left) -->
  <g transform="translate(256, 270) rotate(-12)" filter="url(#shadow1)">
    <rect x="-95" y="-120" width="190" height="240" rx="16" ry="16" fill="url(#card3)" opacity="0.5"/>
    <rect x="-65" y="-85" width="90" height="8" rx="4" fill="white" opacity="0.2"/>
    <rect x="-65" y="-65" width="130" height="6" rx="3" fill="white" opacity="0.15"/>
    <rect x="-65" y="-50" width="110" height="6" rx="3" fill="white" opacity="0.12"/>
    <rect x="-65" y="-30" width="130" height="70" rx="8" fill="white" opacity="0.1"/>
  </g>

  <!-- Middle card -->
  <g transform="translate(256, 260) rotate(5)" filter="url(#shadow2)">
    <rect x="-95" y="-120" width="190" height="240" rx="16" ry="16" fill="url(#card2)" opacity="0.7"/>
    <rect x="-65" y="-85" width="80" height="8" rx="4" fill="white" opacity="0.25"/>
    <rect x="-65" y="-65" width="130" height="6" rx="3" fill="white" opacity="0.2"/>
    <rect x="-65" y="-50" width="100" height="6" rx="3" fill="white" opacity="0.15"/>
    <rect x="-65" y="-30" width="130" height="70" rx="8" fill="white" opacity="0.12"/>
    <rect x="-65" y="55" width="70" height="6" rx="3" fill="white" opacity="0.15"/>
    <rect x="-65" y="70" width="130" height="6" rx="3" fill="white" opacity="0.12"/>
  </g>

  <!-- Front card -->
  <g transform="translate(256, 250)" filter="url(#shadow1)">
    <rect x="-95" y="-120" width="190" height="240" rx="16" ry="16" fill="url(#card1)"/>
    <rect x="-65" y="-85" width="95" height="10" rx="5" fill="white" opacity="0.9"/>
    <rect x="-65" y="-63" width="130" height="6" rx="3" fill="white" opacity="0.35"/>
    <rect x="-65" y="-48" width="110" height="6" rx="3" fill="white" opacity="0.25"/>
    <rect x="-65" y="-28" width="130" height="75" rx="8" fill="white" opacity="0.15"/>
    <circle cx="0" cy="9" r="18" fill="white" opacity="0.2"/>
    <polygon points="0,-8 10,8 -10,8" fill="white" opacity="0.25"/>
    <rect x="-65" y="60" width="60" height="6" rx="3" fill="white" opacity="0.3"/>
    <rect x="-65" y="75" width="130" height="6" rx="3" fill="white" opacity="0.2"/>
    <rect x="-65" y="90" width="90" height="6" rx="3" fill="white" opacity="0.15"/>
  </g>

  <!-- Gear accent -->
  <g transform="translate(370, 130)" opacity="0.6">
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#card1)" stroke-width="6"/>
    <rect x="-3" y="-30" width="6" height="12" rx="3" fill="#8b5cf6"/>
    <rect x="-3" y="18" width="6" height="12" rx="3" fill="#8b5cf6"/>
    <rect x="-30" y="-3" width="12" height="6" rx="3" fill="#8b5cf6"/>
    <rect x="18" y="-3" width="12" height="6" rx="3" fill="#8b5cf6"/>
    <g transform="rotate(45)">
      <rect x="-3" y="-30" width="6" height="12" rx="3" fill="#8b5cf6"/>
      <rect x="-3" y="18" width="6" height="12" rx="3" fill="#8b5cf6"/>
      <rect x="-30" y="-3" width="12" height="6" rx="3" fill="#8b5cf6"/>
      <rect x="18" y="-3" width="12" height="6" rx="3" fill="#8b5cf6"/>
    </g>
    <circle cx="0" cy="0" r="10" fill="#1a1525"/>
  </g>
</svg>