<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1525"/>
      <stop offset="100%" stop-color="#0f0d17"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle road line accent -->
  <g opacity="0.15">
    <line x1="100" y1="340" x2="412" y2="340" stroke="#a78bfa" stroke-width="3" stroke-dasharray="20,12"/>
  </g>

  <!-- "C" letter -->
  <g transform="translate(152, 256)" filter="url(#shadow)">
    <path d="M 68,0 A 68,68 0 1,0 68,0.01" fill="none" stroke="url(#textGrad)" stroke-width="28" stroke-linecap="round"
          transform="rotate(45)" stroke-dasharray="320" stroke-dashoffset="85"/>
  </g>

  <!-- "M" letter -->
  <g transform="translate(280, 256)" filter="url(#shadow)">
    <path d="M -52,52 L -52,-40 L 0,-5 L 52,-40 L 52,52" 
          fill="none" stroke="url(#accentGrad)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Tire tread accent -->
  <g transform="translate(256, 390)" opacity="0.3">
    <rect x="-80" y="-4" width="16" height="8" rx="2" fill="#a78bfa" transform="rotate(-15)"/>
    <rect x="-52" y="-4" width="16" height="8" rx="2" fill="#a78bfa" transform="rotate(-10)"/>
    <rect x="-24" y="-4" width="16" height="8" rx="2" fill="#a78bfa" transform="rotate(-5)"/>
    <rect x="4" y="-4" width="16" height="8" rx="2" fill="#a78bfa"/>
    <rect x="32" y="-4" width="16" height="8" rx="2" fill="#a78bfa" transform="rotate(5)"/>
    <rect x="60" y="-4" width="16" height="8" rx="2" fill="#a78bfa" transform="rotate(10)"/>
  </g>
</svg>