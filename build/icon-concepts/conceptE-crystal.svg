<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <linearGradient id="crystalFaceL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9a3412" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="crystalFaceR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="crystalTop" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#fdba74" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbbf6a" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="crystalGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="edgeGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cmShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!--
    Elongated diamond/crystal — top facet + left face + right face + bottom point
    Top: 256,52   Left: 90,240   Right: 422,240   Bottom: 256,460
    Ridge midpoints: TopLeft(173,146) TopRight(339,146)
  -->

  <g filter="url(#crystalGlow)">
    <!-- Left face -->
    <polygon points="256,52 90,240 256,460" fill="url(#crystalFaceL)"/>
    <!-- Right face -->
    <polygon points="256,52 422,240 256,460" fill="url(#crystalFaceR)"/>
    <!-- Top left facet -->
    <polygon points="256,52 90,240 256,240" fill="url(#crystalTop)"/>
    <!-- Top right facet -->
    <polygon points="256,52 422,240 256,240" fill="#fdba74" opacity="0.15"/>
  </g>

  <!-- Crystal edges — white highlights -->
  <g filter="url(#edgeGlow)" opacity="0.8">
    <!-- Outer edges -->
    <line x1="256" y1="52" x2="90" y2="240" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="256" y1="52" x2="422" y2="240" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="90" y1="240" x2="256" y2="460" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="422" y1="240" x2="256" y2="460" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <!-- Center ridge -->
    <line x1="256" y1="52" x2="256" y2="460" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- Horizontal equator -->
    <line x1="90" y1="240" x2="422" y2="240" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Sparkle highlights -->
  <circle cx="200" cy="180" r="3" fill="white" opacity="0.5"/>
  <circle cx="310" cy="150" r="2" fill="white" opacity="0.4"/>
  <circle cx="256" cy="100" r="4" fill="white" opacity="0.35"/>

  <!-- CM — white, center of crystal -->
  <g filter="url(#cmShadow)" opacity="0.95">
    <path d="M 220,220 C 175,220 150,242 150,270 C 150,298 175,320 220,320"
          fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <path d="M 250,320 L 250,220 L 290,290 L 330,220 L 330,320"
          fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>