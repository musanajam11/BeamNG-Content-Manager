<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1119"/>
    </linearGradient>
    <radialGradient id="nodeGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <radialGradient id="nodeGradDim" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#d4956a"/>
      <stop offset="50%" stop-color="#b85a10"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>
    <filter id="beamGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f97316" flood-opacity="0.4"/>
    </filter>
    <filter id="nodeShadowBack" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#f97316" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!--
    Inverted Tetrahedron (4 vertices, 6 edges, 4 faces)
    Perspective view: apex pointing DOWN, base triangle on top

    A (apex/bottom):   256, 440
    B (top-left):       95, 112
    C (top-right):     420, 132
    D (back-center):   270, 267
  -->

  <!-- BACK FACES (filled for depth) -->
  <polygon points="256,440 95,112 270,267" fill="white" opacity="0.06"/>
  <polygon points="256,440 420,132 270,267" fill="white" opacity="0.08"/>
  <polygon points="95,112 420,132 270,267" fill="white" opacity="0.05"/>
  <!-- Front face -->
  <polygon points="256,440 95,112 420,132" fill="white" opacity="0.12"/>

  <!-- BACK EDGES (connecting to D - dimmest) -->
  <g filter="url(#beamGlow)" opacity="0.4">
    <line x1="256" y1="440" x2="270" y2="267" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <line x1="95" y1="112" x2="270" y2="267" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <line x1="420" y1="132" x2="270" y2="267" stroke="white" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- FRONT EDGES (bright) -->
  <g filter="url(#beamGlow)" opacity="1">
    <line x1="256" y1="440" x2="95" y2="112" stroke="white" stroke-width="20" stroke-linecap="round"/>
    <line x1="256" y1="440" x2="420" y2="132" stroke="white" stroke-width="20" stroke-linecap="round"/>
    <line x1="95" y1="112" x2="420" y2="132" stroke="white" stroke-width="19" stroke-linecap="round"/>
  </g>

  <!-- BACK NODE D (smaller, dimmer) -->
  <circle cx="270" cy="267" r="24" fill="url(#nodeGradDim)" filter="url(#nodeShadowBack)"/>

  <!-- FRONT NODES (large, bright) -->
  <g filter="url(#nodeShadow)">
    <circle cx="256" cy="440" r="42" fill="url(#nodeGrad)"/>
    <circle cx="95" cy="112" r="38" fill="url(#nodeGrad)"/>
    <circle cx="420" cy="132" r="38" fill="url(#nodeGrad)"/>
  </g>

  <!-- "C" on left, "M" on right — spread across pyramid -->
  <g opacity="0.95">
    <!-- "C" arc — left side -->
    <path d="M 195,185 C 140,185 108,215 108,260 C 108,305 140,335 195,335"
          fill="none" stroke="#f97316" stroke-width="24" stroke-linecap="round"/>
    <!-- "M" strokes — right side -->
    <path d="M 310,335 L 310,185 L 348,280 L 386,185 L 386,335"
          fill="none" stroke="#f97316" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>