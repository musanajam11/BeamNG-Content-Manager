<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fbbf6a"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f97316" flood-opacity="0.6"/>
    </filter>
    <filter id="cmGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="200" fill="url(#centerGlow)"/>

  <!-- Hexagonal network — 6 outer nodes connected to center hub -->
  <!-- Hex vertices at r=185 from center -->
  <!-- 0: 256,71  60: 416,163  120: 416,349  180: 256,441  240: 96,349  300: 96,163 -->

  <!-- Connecting lines — outer ring -->
  <g filter="url(#lineGlow)" opacity="0.35">
    <line x1="256" y1="71" x2="416" y2="163" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="416" y1="163" x2="416" y2="349" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="416" y1="349" x2="256" y2="441" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="256" y1="441" x2="96" y2="349" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="96" y1="349" x2="96" y2="163" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="96" y1="163" x2="256" y2="71" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Spokes — center to each outer node -->
  <g filter="url(#lineGlow)" opacity="0.5">
    <line x1="256" y1="256" x2="256" y2="71" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="416" y2="163" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="416" y2="349" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="256" y2="441" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="96" y2="349" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="96" y2="163" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Outer nodes (small) -->
  <g filter="url(#nodeGlow)">
    <circle cx="256" cy="71" r="14" fill="url(#nodeGrad)"/>
    <circle cx="416" cy="163" r="14" fill="url(#nodeGrad)"/>
    <circle cx="416" cy="349" r="14" fill="url(#nodeGrad)"/>
    <circle cx="256" cy="441" r="14" fill="url(#nodeGrad)"/>
    <circle cx="96" cy="349" r="14" fill="url(#nodeGrad)"/>
    <circle cx="96" cy="163" r="14" fill="url(#nodeGrad)"/>
  </g>

  <!-- Center hub (large) -->
  <circle cx="256" cy="256" r="28" fill="url(#nodeGrad)" filter="url(#nodeGlow)"/>

  <!-- CM overlaid in center — white, bold -->
  <g filter="url(#cmGlow)" opacity="0.95">
    <path d="M 217,210 C 175,210 152,230 152,258 C 152,286 175,306 217,306"
          fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>
    <path d="M 243,306 L 243,210 L 280,275 L 317,210 L 317,306"
          fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>