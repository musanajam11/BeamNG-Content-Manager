<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="45%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fdd5a0"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="nodeGradSmall" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fbbf6a"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <radialGradient id="hubGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fbbf6a"/>
      <stop offset="35%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </radialGradient>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#f97316" flood-opacity="0.6"/>
    </filter>
    <filter id="hubGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#f97316" flood-opacity="0.55"/>
    </filter>
    <filter id="cmShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  <circle cx="240" cy="256" r="230" fill="url(#centerGlow)"/>

  <!--
    Asymmetric layout — hub slightly left-of-center
    6 outer nodes at varying distances (not a perfect hex) for organic network feel
    + 3 tiny satellite nodes for extra complexity
  -->

  <!-- Satellite nodes (tiny, far out) with faint connections -->
  <g filter="url(#lineGlow)" opacity="0.12">
    <line x1="440" y1="78" x2="390" y2="155" stroke="white" stroke-width="2"/>
    <line x1="440" y1="78" x2="256" y2="76" stroke="white" stroke-width="1.5"/>
    <line x1="60" y1="430" x2="120" y2="355" stroke="white" stroke-width="2"/>
    <line x1="60" y1="430" x2="256" y2="430" stroke="white" stroke-width="1.5"/>
    <line x1="455" y1="280" x2="400" y2="330" stroke="white" stroke-width="2"/>
    <line x1="455" y1="280" x2="390" y2="155" stroke="white" stroke-width="1.5"/>
  </g>
  <circle cx="440" cy="78" r="6" fill="url(#nodeGradSmall)" opacity="0.5"/>
  <circle cx="60" cy="430" r="6" fill="url(#nodeGradSmall)" opacity="0.4"/>
  <circle cx="455" cy="280" r="7" fill="url(#nodeGradSmall)" opacity="0.45"/>

  <!-- Main 6 nodes — slightly irregular hex -->
  <!-- N0: 256,76  N1: 390,155  N2: 400,330  N3: 256,430  N4: 120,355  N5: 108,168 -->

  <!-- Cross-links (select diagonals) -->
  <g filter="url(#lineGlow)" opacity="0.1">
    <line x1="256" y1="76" x2="400" y2="330" stroke="white" stroke-width="2"/>
    <line x1="256" y1="76" x2="120" y2="355" stroke="white" stroke-width="2"/>
    <line x1="390" y1="155" x2="256" y2="430" stroke="white" stroke-width="2"/>
    <line x1="108" y1="168" x2="400" y2="330" stroke="white" stroke-width="2"/>
  </g>

  <!-- Outer ring -->
  <g filter="url(#lineGlow)" opacity="0.4">
    <line x1="256" y1="76" x2="390" y2="155" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="390" y1="155" x2="400" y2="330" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="330" x2="256" y2="430" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="256" y1="430" x2="120" y2="355" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="120" y1="355" x2="108" y2="168" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="108" y1="168" x2="256" y2="76" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Spokes to hub (240,256) — orange -->
  <g filter="url(#lineGlow)" opacity="0.65">
    <line x1="240" y1="256" x2="256" y2="76" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="240" y1="256" x2="390" y2="155" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="240" y1="256" x2="400" y2="330" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="240" y1="256" x2="256" y2="430" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="240" y1="256" x2="120" y2="355" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="240" y1="256" x2="108" y2="168" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Main outer nodes -->
  <g filter="url(#nodeGlow)">
    <circle cx="256" cy="76" r="18" fill="url(#nodeGrad)"/>
    <circle cx="390" cy="155" r="18" fill="url(#nodeGrad)"/>
    <circle cx="400" cy="330" r="18" fill="url(#nodeGrad)"/>
    <circle cx="256" cy="430" r="18" fill="url(#nodeGrad)"/>
    <circle cx="120" cy="355" r="18" fill="url(#nodeGrad)"/>
    <circle cx="108" cy="168" r="18" fill="url(#nodeGrad)"/>
  </g>

  <!-- Center hub -->
  <circle cx="240" cy="256" r="38" fill="url(#hubGrad)" filter="url(#hubGlow)"/>
  <circle cx="233" cy="248" r="8" fill="white" opacity="0.2"/>

  <!-- CM — white with drop shadow, centered on hub -->
  <g filter="url(#cmShadow)" opacity="0.95">
    <path d="M 210,218 C 170,218 150,234 150,256 C 150,278 170,294 210,294"
          fill="none" stroke="white" stroke-width="20" stroke-linecap="round"/>
    <path d="M 236,294 L 236,218 L 268,270 L 300,218 L 300,294"
          fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>