<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1119"/>
    </linearGradient>
    <!-- Original orange node gradient -->
    <radialGradient id="nodeGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <filter id="beamGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f97316" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Outer triangle beams -->
  <g filter="url(#beamGlow)">
    <line x1="256" y1="108" x2="120" y2="340" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <line x1="256" y1="108" x2="392" y2="340" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <line x1="120" y1="340" x2="392" y2="340" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <!-- Inner beams to center hub -->
    <line x1="256" y1="108" x2="256" y2="260" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.55"/>
    <line x1="120" y1="340" x2="256" y2="260" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.55"/>
    <line x1="392" y1="340" x2="256" y2="260" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Outer nodes (orange) -->
  <g filter="url(#nodeShadow)">
    <circle cx="256" cy="108" r="40" fill="url(#nodeGrad)"/>
    <circle cx="120" cy="340" r="40" fill="url(#nodeGrad)"/>
    <circle cx="392" cy="340" r="40" fill="url(#nodeGrad)"/>
  </g>

  <!-- Center hub node -->
  <circle cx="256" cy="260" r="38" fill="url(#nodeGrad)" filter="url(#nodeShadow)"/>

  <!-- "C" as a stroked arc path -->
  <path d="M 252,244 C 238,244 230,250 230,260 C 230,270 238,276 252,276"
        fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- "M" as a stroked path -->
  <path d="M 260,276 L 260,244 L 270,264 L 280,244 L 280,276"
        fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>