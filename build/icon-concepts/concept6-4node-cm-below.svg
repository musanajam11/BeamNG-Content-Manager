<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1119"/>
    </linearGradient>
    <radialGradient id="nodeGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </radialGradient>
    <filter id="beamGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#14b8a6" flood-opacity="0.4"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Outer triangle beams -->
  <g filter="url(#beamGlow)">
    <line x1="256" y1="100" x2="116" y2="316" stroke="white" stroke-width="15" stroke-linecap="round"/>
    <line x1="256" y1="100" x2="396" y2="316" stroke="white" stroke-width="15" stroke-linecap="round"/>
    <line x1="116" y1="316" x2="396" y2="316" stroke="white" stroke-width="15" stroke-linecap="round"/>
    <!-- Inner beams to center -->
    <line x1="256" y1="100" x2="256" y2="248" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <line x1="116" y1="316" x2="256" y2="248" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <line x1="396" y1="316" x2="256" y2="248" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Outer nodes -->
  <g filter="url(#nodeShadow)">
    <circle cx="256" cy="100" r="38" fill="url(#nodeGrad)"/>
    <circle cx="116" cy="316" r="38" fill="url(#nodeGrad)"/>
    <circle cx="396" cy="316" r="38" fill="url(#nodeGrad)"/>
  </g>

  <!-- Center hub node -->
  <circle cx="256" cy="248" r="32" fill="url(#nodeGrad)" filter="url(#nodeShadow)"/>

  <!-- Stylized "CM" below the triangle -->
  <g filter="url(#textGlow)">
    <text x="256" y="420" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="4" opacity="0.85">CM</text>
  </g>
</svg>