<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <linearGradient id="arcOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf6a"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="needleGrad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fbbf6a"/>
    </linearGradient>
    <filter id="arcGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="needleShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="hubShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#f97316" flood-opacity="0.5"/>
    </filter>
    <filter id="cmShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Outer track ring (full circle, dim) -->
  <circle cx="256" cy="252" r="190" fill="none" stroke="white" stroke-width="6" opacity="0.06"/>

  <!-- Speedo arc — 270° sweep. Stroke-dasharray: 270/360 * 2π*190 ≈ 895. Full circ ≈ 1194 -->
  <!-- Background track arc -->
  <circle cx="256" cy="252" r="190" fill="none" stroke="white" stroke-width="24" opacity="0.06"
          stroke-dasharray="895 1194" stroke-dashoffset="-149" stroke-linecap="round"
          transform="rotate(0,256,252)"/>

  <!-- Orange filled arc (~80%) — dasharray 716 = 80% of 895 -->
  <g filter="url(#arcGlow)">
    <circle cx="256" cy="252" r="190" fill="none" stroke="url(#arcOrange)" stroke-width="28"
            stroke-dasharray="716 1194" stroke-dashoffset="-149" stroke-linecap="round"/>
  </g>

  <!-- Second thinner inner arc for depth — partial -->
  <circle cx="256" cy="252" r="160" fill="none" stroke="#f97316" stroke-width="4" opacity="0.15"
          stroke-dasharray="753 1005" stroke-dashoffset="-126" stroke-linecap="round"/>

  <!-- Tick marks — major + minor around the 270° arc -->
  <g opacity="0.25" stroke="white" stroke-linecap="round">
    <!-- Major ticks (every 45° from 135° to 405°) -->
    <line x1="121" y1="387" x2="137" y2="371" stroke-width="4"/>
    <line x1="66" y1="252" x2="86" y2="252" stroke-width="4"/>
    <line x1="121" y1="117" x2="137" y2="133" stroke-width="4"/>
    <line x1="256" y1="62" x2="256" y2="82" stroke-width="4"/>
    <line x1="391" y1="117" x2="375" y2="133" stroke-width="4"/>
    <line x1="446" y1="252" x2="426" y2="252" stroke-width="4"/>
    <line x1="391" y1="387" x2="375" y2="371" stroke-width="4"/>
    <!-- Minor ticks (every 22.5° between majors) -->
    <line x1="86" y1="322" x2="100" y2="312" stroke-width="2"/>
    <line x1="86" y1="182" x2="100" y2="192" stroke-width="2"/>
    <line x1="181" y1="82" x2="188" y2="98" stroke-width="2"/>
    <line x1="331" y1="82" x2="324" y2="98" stroke-width="2"/>
    <line x1="426" y1="182" x2="412" y2="192" stroke-width="2"/>
    <line x1="426" y1="322" x2="412" y2="312" stroke-width="2"/>
  </g>

  <!-- Needle — long, pointing ~310° (between top-right major ticks) -->
  <g filter="url(#needleShadow)">
    <polygon points="256,252 248,260 382,138 264,244" fill="url(#needleGrad)" opacity="0.9"/>
    <line x1="256" y1="252" x2="382" y2="138" stroke="url(#needleGrad)" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Center hub -->
  <g filter="url(#hubShadow)">
    <circle cx="256" cy="252" r="22" fill="#f97316"/>
    <circle cx="256" cy="252" r="12" fill="#1a1d2e"/>
    <circle cx="256" cy="252" r="6" fill="#f97316" opacity="0.5"/>
  </g>

  <!-- CM — bold orange, below center -->
  <g filter="url(#cmShadow)" opacity="0.95">
    <path d="M 198,320 C 160,320 140,340 140,365 C 140,390 160,410 198,410"
          fill="none" stroke="#f97316" stroke-width="20" stroke-linecap="round"/>
    <path d="M 228,410 L 228,320 L 268,380 L 308,320 L 308,410"
          fill="none" stroke="#f97316" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>