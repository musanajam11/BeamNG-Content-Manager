<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1119"/>
    </linearGradient>
    <radialGradient id="nodeGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </radialGradient>
    <linearGradient id="cmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="beamGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#14b8a6" flood-opacity="0.4"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Outer triangle beams -->
  <g filter="url(#beamGlow)">
    <line x1="256" y1="100" x2="116" y2="310" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <line x1="256" y1="100" x2="396" y2="310" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <line x1="116" y1="310" x2="396" y2="310" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <!-- Inner beams to center -->
    <line x1="256" y1="100" x2="256" y2="240" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <line x1="116" y1="310" x2="256" y2="240" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <line x1="396" y1="310" x2="256" y2="240" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Outer nodes -->
  <g filter="url(#nodeShadow)">
    <circle cx="256" cy="100" r="36" fill="url(#nodeGrad)"/>
    <circle cx="116" cy="310" r="36" fill="url(#nodeGrad)"/>
    <circle cx="396" cy="310" r="36" fill="url(#nodeGrad)"/>
  </g>

  <!-- Center hub node -->
  <circle cx="256" cy="240" r="28" fill="url(#nodeGrad)" filter="url(#nodeShadow)"/>

  <!-- Stylized "CM" integrated into the triangle area — 
       C wraps around the left side, M fills the right, 
       using the beams as part of the letterforms -->
  <g filter="url(#textGlow)" opacity="0.9">
    <!-- C as a bold stroke arc on the left -->
    <path d="M 230,370 C 170,370 130,405 130,430 C 130,455 170,490 230,490" 
          fill="none" stroke="url(#cmGrad)" stroke-width="18" stroke-linecap="round"/>
    <!-- M on the right -->
    <path d="M 270,490 L 270,370 L 316,420 L 362,370 L 362,490" 
          fill="none" stroke="url(#cmGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>