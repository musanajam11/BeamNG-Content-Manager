<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#f97316" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fdd5a0"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="hubGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fbbf6a"/>
      <stop offset="35%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </radialGradient>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#f97316" flood-opacity="0.6"/>
    </filter>
    <filter id="hubGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#f97316" flood-opacity="0.5"/>
    </filter>
    <filter id="cmGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringPulse" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="230" fill="url(#centerGlow)"/>

  <!-- Concentric pulse rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.08" filter="url(#ringPulse)"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.12" filter="url(#ringPulse)"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#f97316" stroke-width="2" opacity="0.06"/>

  <!-- Hex r=180: 0°(256,76) 60°(412,166) 120°(412,346) 180°(256,436) 240°(100,346) 300°(100,166) -->

  <!-- Cross-links -->
  <g filter="url(#lineGlow)" opacity="0.1">
    <line x1="256" y1="76" x2="412" y2="346" stroke="white" stroke-width="2"/>
    <line x1="256" y1="76" x2="100" y2="346" stroke="white" stroke-width="2"/>
    <line x1="412" y1="166" x2="100" y2="346" stroke="white" stroke-width="2"/>
    <line x1="412" y1="166" x2="256" y2="436" stroke="white" stroke-width="2"/>
    <line x1="412" y1="346" x2="100" y2="166" stroke="white" stroke-width="2"/>
    <line x1="100" y1="166" x2="256" y2="436" stroke="white" stroke-width="2"/>
  </g>

  <!-- Outer ring -->
  <g filter="url(#lineGlow)" opacity="0.35">
    <line x1="256" y1="76" x2="412" y2="166" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="412" y1="166" x2="412" y2="346" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="412" y1="346" x2="256" y2="436" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="256" y1="436" x2="100" y2="346" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="346" x2="100" y2="166" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="166" x2="256" y2="76" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Spokes — orange -->
  <g filter="url(#lineGlow)" opacity="0.55">
    <line x1="256" y1="256" x2="256" y2="76" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="412" y2="166" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="412" y2="346" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="256" y2="436" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="100" y2="346" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="100" y2="166" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Outer nodes — smaller -->
  <g filter="url(#nodeGlow)">
    <circle cx="256" cy="76" r="16" fill="url(#nodeGrad)"/>
    <circle cx="412" cy="166" r="16" fill="url(#nodeGrad)"/>
    <circle cx="412" cy="346" r="16" fill="url(#nodeGrad)"/>
    <circle cx="256" cy="436" r="16" fill="url(#nodeGrad)"/>
    <circle cx="100" cy="346" r="16" fill="url(#nodeGrad)"/>
    <circle cx="100" cy="166" r="16" fill="url(#nodeGrad)"/>
  </g>

  <!-- Center hub — bigger -->
  <circle cx="256" cy="256" r="44" fill="url(#hubGrad)" filter="url(#hubGlow)"/>
  <circle cx="248" cy="246" r="10" fill="white" opacity="0.2"/>

  <!-- CM — LARGE, white, dominant -->
  <g filter="url(#cmGlow)" opacity="1">
    <path d="M 228,200 C 174,200 146,226 146,260 C 146,294 174,320 228,320"
          fill="none" stroke="white" stroke-width="26" stroke-linecap="round"/>
    <path d="M 258,320 L 258,200 L 300,280 L 342,200 L 342,320"
          fill="none" stroke="white" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>