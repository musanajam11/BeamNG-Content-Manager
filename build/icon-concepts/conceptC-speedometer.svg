<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="needleGrad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf6a"/>
    </linearGradient>
    <filter id="arcGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="needleShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="cmGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Speedometer arc — 270° sweep from 135° to 405° (bottom-left to bottom-right) -->
  <!-- Outer track (dark) -->
  <circle cx="256" cy="270" r="180" fill="none" stroke="white" stroke-width="8" opacity="0.08"
          stroke-dasharray="848 1132" stroke-dashoffset="-142" stroke-linecap="round"/>

  <!-- Orange progress arc — ~75% filled -->
  <g filter="url(#arcGlow)">
    <circle cx="256" cy="270" r="180" fill="none" stroke="url(#arcGrad)" stroke-width="18"
            stroke-dasharray="636 1132" stroke-dashoffset="-142" stroke-linecap="round"/>
  </g>

  <!-- Tick marks around the arc -->
  <g opacity="0.3" stroke="white" stroke-width="3" stroke-linecap="round">
    <!-- Major ticks at 135°, 180°, 225°, 270°, 315°, 360°, 405° -->
    <line x1="133" y1="397" x2="146" y2="384" />
    <line x1="76" y1="270" x2="94" y2="270" />
    <line x1="133" y1="143" x2="146" y2="156" />
    <line x1="256" y1="90" x2="256" y2="108"/>
    <line x1="379" y1="143" x2="366" y2="156"/>
    <line x1="436" y1="270" x2="418" y2="270"/>
    <line x1="379" y1="397" x2="366" y2="384"/>
  </g>

  <!-- Needle — pointing to ~2 o'clock position (about 315°) -->
  <g filter="url(#needleShadow)">
    <line x1="256" y1="270" x2="370" y2="156" stroke="url(#needleGrad)" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- Needle hub -->
  <circle cx="256" cy="270" r="16" fill="#f97316"/>
  <circle cx="256" cy="270" r="8" fill="#1a1d2e"/>

  <!-- CM below the needle — centered, white -->
  <g filter="url(#cmGlow)" opacity="0.9">
    <path d="M 210,318 C 175,318 158,334 158,356 C 158,378 175,394 210,394"
          fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <path d="M 232,394 L 232,318 L 262,368 L 292,318 L 292,394"
          fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>