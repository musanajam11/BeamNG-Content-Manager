appId: com.beammp.content-manager
productName: BeamMP Content Manager
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!research/*'
  - '!Docs/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
protocols:
  - name: BeamMP Content Manager
    schemes:
      - beammp-cm
win:
  executableName: BeamMP-Content-Manager
  # Tell Windows the installer should register the beammp-cm:// URL handler.
  # electron-builder reads top-level `protocols` and emits the matching
  # NSIS registry writes (HKCU\Software\Classes\beammp-cm).
  protocols:
    - name: BeamMP Content Manager
      schemes:
        - beammp-cm
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: Justmusa
  category: Game
  executableName: beamng-content-manager
  # Linux: electron-builder writes a .desktop file with `MimeType=x-scheme-handler/beammp-cm`
  # so xdg-open routes beammp-cm:// links to CM.
  protocols:
    - name: BeamMP Content Manager
      schemes:
        - beammp-cm
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: musanajam11
  repo: BeamNG-Content-Manager
